<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PatataTrack</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #009A3C;
      --green-l:  #33B865;
      --green-ll: #E0F7EC;
      --bg:       #f5faf7;
      --card:     #ffffff;
      --text:     #0a2016;
      --muted:    #5a7a65;
      --border:   #c8e8d4;
      --radius:   14px;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      color: #fff;
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    header h1 span { font-size: 1.4rem; }
    .header-sub { font-size: .75rem; opacity: .75; margin-top: 1px; }

    /* ── BOTTOM NAV ── */
    nav.bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    nav.bottom button {
      flex: 1; border: none; background: none;
      padding: 10px 0 12px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: .65rem; color: var(--muted); transition: color .2s;
    }
    nav.bottom button.active { color: var(--green); }
    nav.bottom button svg { width: 22px; height: 22px; }

    /* ── SCREENS ── */
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }

    .section-title {
      font-size: .8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 12px;
    }

    /* ── SEARCH ── */
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-bar input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: .9rem; background: var(--card);
      color: var(--text); outline: none;
    }
    .search-bar input:focus { border-color: var(--green-l); }

    /* ── PARCELA CARD ── */
    .parcela-card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 12px; overflow: hidden; cursor: pointer;
      transition: transform .15s; border: 1.5px solid transparent;
    }
    .parcela-card:active { transform: scale(.98); }
    .card-header {
      background: var(--green); padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .card-header h3 { color: #fff; font-size: 1rem; }
    .card-header .badge {
      background: rgba(255,255,255,.25); color: #fff;
      font-size: .7rem; padding: 3px 8px; border-radius: 20px; white-space: nowrap;
    }
    .card-body { padding: 12px 16px; }
    .card-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
    .card-field { font-size: .8rem; color: var(--muted); }
    .card-field strong { display: block; color: var(--text); font-size: .88rem; }
    .card-footer {
      padding: 8px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 12px; align-items: center;
    }
    .card-footer span { font-size: .75rem; color: var(--muted); display: flex; align-items: center; gap: 4px; }

    /* mini-map thumbnail en card */
    .card-map {
      height: 100px; width: 100%; pointer-events: none;
      border-bottom: 1px solid var(--border);
      isolation: isolate;
      transform: translateZ(0);
    }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 80px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--green); color: #fff; border: none;
      font-size: 1.8rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(45,106,79,.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s; z-index: 99;
    }
    .fab:active { transform: scale(.92); }

    /* ── OVERLAYS ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 1001; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-height: 92vh; overflow-y: auto;
      padding: 20px 20px 36px; animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 4px; margin: 0 auto 20px;
    }
    .sheet h2 { font-size: 1.1rem; margin-bottom: 20px; color: var(--green); }

    /* ── MAP OVERLAY (full screen picker) ── */
    #overlay-map {
      display: none; position: fixed; inset: 0;
      z-index: 1002; flex-direction: column; background: #000;
    }
    #overlay-map.open { display: flex; }
    #map-picker { flex: 1; width: 100%; }

    #map-topbar {
      background: var(--green); color: #fff;
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; position: relative; z-index: 1010;
    }
    #map-topbar button.map-close {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #map-topbar span { flex: 1; font-size: .9rem; font-weight: 600; }

    #map-bottombar {
      background: var(--card); padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
      border-top: 1px solid var(--border); position: relative; z-index: 1010;
    }
    #map-address-display {
      font-size: .85rem; color: var(--text); min-height: 20px;
      display: flex; align-items: center; gap: 6px;
    }
    #map-address-display.loading { color: var(--muted); font-style: italic; }
    #map-bottombar-btns { display: flex; gap: 10px; }
    #map-bottombar-btns button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: .9rem; font-weight: 700; cursor: pointer;
    }
    #btn-map-gps { background: var(--green-ll); color: var(--green); }
    #btn-map-confirm { background: var(--green); color: #fff; }

    /* crosshair en el centro del mapa */
    #map-crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -100%);
      pointer-events: none; z-index: 1000; font-size: 2rem; line-height: 1;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: .8rem; font-weight: 600; color: var(--muted);
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em;
    }
    input[type=text], input[type=number], select, textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 14px; font-size: .95rem; color: var(--text);
      background: var(--bg); outline: none; font-family: inherit;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green-l); background: #fff; }
    textarea { resize: vertical; min-height: 80px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* ubicación con botón mapa */
    .ubicacion-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .ubicacion-wrap input { flex: 1; }
    .btn-map-open {
      flex-shrink: 0; width: 44px; height: 44px; border-radius: 10px;
      background: var(--green); color: #fff; border: none;
      font-size: 1.3rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    /* coords badge */
    .coords-badge {
      display: none; margin-top: 6px; font-size: .75rem; color: var(--muted);
      background: var(--green-ll); padding: 4px 10px; border-radius: 20px;
      width: fit-content;
    }
    .coords-badge.visible { display: inline-block; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-secondary { background: var(--green-ll); color: var(--green); margin-top: 8px; }

    /* ── DETAIL ── */
    .detail-back {
      display: flex; align-items: center; gap: 8px; color: var(--green);
      font-weight: 600; font-size: .9rem; cursor: pointer;
      margin-bottom: 16px; background: none; border: none; padding: 0;
    }
    .detail-hero {
      background: var(--green); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 16px;
    }
    .detail-hero-map { height: 140px; width: 100%; pointer-events: none; isolation: isolate; transform: translateZ(0); }
    .detail-hero-info { padding: 14px 20px 18px; color: #fff; }
    .detail-hero-info h2 { font-size: 1.3rem; margin-bottom: 4px; }
    .detail-hero-info p { opacity: .8; font-size: .85rem; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .info-item { background: var(--card); border-radius: 10px; padding: 12px; box-shadow: var(--shadow); }
    .info-item .info-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: .06em; margin-bottom: 3px; }
    .info-item .info-val { font-size: .95rem; font-weight: 600; }

    /* ── TIMELINE ── */
    .timeline { margin-top: 8px; }
    .timeline-item { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
    .timeline-item .ti-header {
      padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .ti-date { font-size: .75rem; color: var(--muted); }
    .ti-author { font-size: .75rem; font-weight: 600; color: var(--green); }
    /* fotos en timeline */
    .ti-fotos {
      display: flex; gap: 6px; overflow-x: auto; padding: 10px 14px 6px;
      scrollbar-width: none;
    }
    .ti-fotos::-webkit-scrollbar { display: none; }
    .ti-fotos img {
      height: 140px; width: 140px; object-fit: cover;
      border-radius: 8px; flex-shrink: 0; cursor: pointer;
    }
    .ti-fotos .demo-foto {
      height: 140px; width: 140px; flex-shrink: 0; border-radius: 8px;
      background: linear-gradient(135deg, var(--green-ll), #b7dfc0);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: var(--green); font-size: .75rem; gap: 4px;
    }
    .ti-comment { padding: 10px 14px 12px; font-size: .88rem; line-height: 1.5; }
    .ti-tag {
      display: inline-block; background: var(--green-ll); color: var(--green);
      font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      margin: 8px 14px 0;
    }
    .ti-actions {
      display: flex; gap: 8px; padding: 8px 14px 12px; border-top: 1px solid var(--border); margin-top: 8px;
    }
    .ti-btn {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      font-size: .8rem; font-weight: 700; cursor: pointer;
    }
    .ti-btn-edit { background: var(--green-ll); color: var(--green); }
    .ti-btn-del  { background: #fee2e2; color: #dc2626; }

    /* fotos en formulario */
    .fotos-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
    }
    .foto-thumb {
      position: relative; width: 80px; height: 80px;
    }
    .foto-thumb img {
      width: 80px; height: 80px; object-fit: cover; border-radius: 8px;
    }
    .foto-thumb .foto-del {
      position: absolute; top: -6px; right: -6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #dc2626; color: #fff; border: none;
      font-size: .75rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
    }
    .btn-add-foto {
      width: 80px; height: 80px; border-radius: 8px;
      border: 2px dashed var(--green-l); background: var(--green-ll);
      color: var(--green); font-size: 1.8rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
    .stat-card .stat-num { font-size: 2rem; font-weight: 800; color: var(--green); }
    .stat-card .stat-label { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .variety-bar-wrap { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .variety-bar-wrap h3 { font-size: .85rem; font-weight: 700; margin-bottom: 12px; }
    .var-row { margin-bottom: 10px; }
    .var-label { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: 4px; }
    .var-label span:last-child { color: var(--muted); }
    .bar-bg { background: var(--green-ll); border-radius: 4px; height: 8px; }
    .bar-fill { background: var(--green); border-radius: 4px; height: 8px; transition: width .6s ease; }

    @media (min-width: 640px) { body { max-width: 480px; margin: 0 auto; } }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🥔 PatataTrack</h1>
    <div class="header-sub">Gestión de parcelas</div>
  </div>
  <img src="hijolusa.png" alt="Hijolusa" style="height:26px;filter:brightness(0) invert(1);" />
</header>

<!-- ── LISTA ── -->
<div class="screen active" id="screen-parcelas">
  <div class="search-bar">
    <input type="text" placeholder="🔍  Buscar parcela, variedad…" oninput="filterParcelas(this.value)" />
  </div>
  <div class="section-title">Mis parcelas</div>
  <div id="parcelas-list"></div>
</div>

<!-- ── DETALLE ── -->
<div class="screen" id="screen-detail">
  <button class="detail-back" onclick="goBack()">← Volver a parcelas</button>
  <div id="detail-content"></div>
</div>

<!-- ── STATS ── -->
<div class="screen" id="screen-stats">
  <div class="section-title">Resumen de campaña</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-parcelas">0</div><div class="stat-label">Parcelas</div></div>
    <div class="stat-card"><div class="stat-num" id="s-ha">0</div><div class="stat-label">Hectáreas totales</div></div>
    <div class="stat-card"><div class="stat-num" id="s-fotos">0</div><div class="stat-label">Fotos</div></div>
    <div class="stat-card"><div class="stat-num" id="s-agricultores">0</div><div class="stat-label">Agricultores</div></div>
  </div>
  <div class="variety-bar-wrap"><h3>Distribución por variedad</h3><div id="variety-bars"></div></div>
  <div class="variety-bar-wrap" style="margin-top:0"><h3>Superficie por agricultor</h3><div id="agricultor-bars"></div></div>
</div>

<!-- ── BOTTOM NAV ── -->
<nav class="bottom">
  <button class="active" onclick="switchTab('parcelas',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Parcelas
  </button>
  <button onclick="switchTab('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Estadísticas
  </button>
</nav>

<button class="fab" id="fab" onclick="openNewParcela()">＋</button>

<!-- ════════════════════════════════
     MODAL: MAPA SELECTOR
════════════════════════════════ -->
<div id="overlay-map">
  <div id="map-topbar">
    <button class="map-close" onclick="closeMap()">✕</button>
    <span>Elige la ubicación</span>
  </div>

  <!-- contenedor posición relativa para el crosshair -->
  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="map-picker"></div>
    <div id="map-crosshair">📍</div>
  </div>

  <div id="map-bottombar">
    <div id="map-address-display">Mueve el mapa para seleccionar la ubicación</div>
    <div id="map-bottombar-btns">
      <button id="btn-map-gps" onclick="centerOnGPS()">📡 Mi ubicación</button>
      <button id="btn-map-confirm" onclick="confirmMapLocation()">Confirmar</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     MODAL: NUEVA PARCELA
════════════════════════════════ -->
<div class="overlay" id="overlay-parcela" onclick="closeIfBg(event,'overlay-parcela')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>📍 Nueva parcela</h2>
    <form onsubmit="saveParcela(event)">
      <div class="form-group">
        <label>Nombre / Identificador</label>
        <input type="text" id="f-nombre" placeholder="Ej: Parcela Norte 1" required />
      </div>

      <div class="form-group">
        <label>Ubicación</label>
        <div class="ubicacion-wrap">
          <input type="text" id="f-ubicacion" placeholder="Dirección o pulsa el mapa →" required />
          <button type="button" class="btn-map-open" onclick="openMap()" title="Elegir en mapa">🗺️</button>
        </div>
        <div class="coords-badge" id="coords-badge"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Superficie (ha)</label>
          <input type="number" id="f-superficie" step="0.01" min="0.01" placeholder="0.00" required />
        </div>
        <div class="form-group">
          <label>Variedad</label>
          <select id="f-variedad" required>
            <option value="">Seleccionar…</option>
            <option>Jazzy</option>
            <option>Lucinda</option>
            <option>Soprano</option>
            <option>Agria</option>
            <option>Babylon</option>
            <option>Caesar</option>
            <option>Colomba</option>
            <option>Memphis</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Agricultor</label>
        <input type="text" id="f-agricultor" placeholder="Nombre del agricultor" required />
      </div>
      <div class="form-group">
        <label>Proveedor de semilla</label>
        <input type="text" id="f-proveedor" placeholder="Nombre del proveedor" required />
      </div>
      <div class="form-group">
        <label>Fecha de siembra</label>
        <input type="text" id="f-siembra" placeholder="dd/mm/aaaa" />
      </div>
      <button class="btn btn-primary" type="submit">Guardar parcela</button>
      <button class="btn btn-secondary" type="button" onclick="closeSheet('overlay-parcela')">Cancelar</button>
    </form>
  </div>
</div>

<!-- ════════════════════════════════
     MODAL: SEGUIMIENTO
════════════════════════════════ -->
<div class="overlay" id="overlay-seguimiento" onclick="closeIfBg(event,'overlay-seguimiento')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="seg-title">📷 Añadir seguimiento</h2>
    <form onsubmit="saveSeguimiento(event)">
      <div class="form-group">
        <label>Fotos (opcional)</label>
        <div class="fotos-grid" id="fotos-grid"></div>
        <button type="button" class="btn-add-foto" onclick="document.getElementById('photo-input').click()">＋</button>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="addPhoto(this)" multiple />
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="f-estado">
          <option>Normal</option>
          <option>Brotación</option>
          <option>Crecimiento</option>
          <option>Floración</option>
          <option>Maduración</option>
          <option>⚠️ Incidencia</option>
        </select>
      </div>
      <div class="form-group">
        <label>Comentario</label>
        <textarea id="f-comentario" placeholder="Describe el estado de la parcela, observaciones, tratamientos realizados…"></textarea>
      </div>
      <button class="btn btn-primary" type="submit">Guardar seguimiento</button>
      <button class="btn btn-secondary" type="button" onclick="closeSheet('overlay-seguimiento')">Cancelar</button>
    </form>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
let parcelas = [
  {
    id: 1, nombre: 'Parcela Norte A',
    ubicacion: 'Sahagún, León',
    lat: 42.371, lng: -5.030,
    superficie: 2.5, variedad: 'Agria',
    agricultor: 'Manuel García', proveedor: 'Semillas Castilla S.L.', siembra: '15/03/2026',
    seguimientos: [
      { id: 1, fecha: '20/03/2026', estado: 'Brotación', comentario: 'Se aprecian los primeros brotes en la mitad norte. Suelo con buena humedad.', fotos: [] },
      { id: 2, fecha: '05/04/2026', estado: 'Crecimiento', comentario: 'Plantas de 15 cm aprox. Primer abonado. Sin incidencias.', fotos: ['demo'] },

    seguimientos: [

let nextId = 4;
let nextSegId = 8;
let currentParcelaId = null;
let editingSegId = null;      // null = nuevo, número = editar
let currentFotos = [];        // array de dataURLs en el formulario
let pickedLat = null, pickedLng = null;

// ─── LEAFLET MAP PICKER ────────────────────────────────────────────────────────
let mapPicker = null;
let geocodeTimer = null;

function openMap() {
  document.getElementById('overlay-map').classList.add('open');
  setTimeout(() => {
    if (!mapPicker) {
      mapPicker = L.map('map-picker', { zoomControl: true, attributionControl: false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
      }).addTo(mapPicker);
      mapPicker.setView([42.5, -5.0], 10);
      mapPicker.on('moveend', onMapMove);
    } else {
      mapPicker.invalidateSize();
    }
    // Si ya había coords guardadas, centrar en ellas
    if (pickedLat) mapPicker.setView([pickedLat, pickedLng], 14);
    onMapMove();
  }, 50);
}

function onMapMove() {
  const c = mapPicker.getCenter();
  pickedLat = c.lat;
  pickedLng = c.lng;
  reverseGeocode(c.lat, c.lng);
}

let lastGeocodeAddr = '';
function reverseGeocode(lat, lng) {
  clearTimeout(geocodeTimer);
  const el = document.getElementById('map-address-display');
  el.className = 'loading';
  el.textContent = 'Obteniendo dirección…';

  geocodeTimer = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es`,
        { headers: { 'Accept-Language': 'es' } }
      );
      const data = await res.json();
      const addr = data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      lastGeocodeAddr = addr;
      el.className = '';
      el.innerHTML = `📍 ${addr}`;
    } catch {
      lastGeocodeAddr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      el.className = '';
      el.textContent = lastGeocodeAddr;
    }
  }, 600);
}

function centerOnGPS() {
  if (!navigator.geolocation) { alert('Tu dispositivo no soporta geolocalización.'); return; }
  const el = document.getElementById('map-address-display');
  el.className = 'loading';
  el.textContent = 'Obteniendo tu posición…';
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    mapPicker.setView([lat, lng], 15);
  }, () => {
    el.className = '';
    el.textContent = 'No se pudo obtener la ubicación.';
  });
}

function confirmMapLocation() {
  if (!pickedLat) return;
  document.getElementById('f-ubicacion').value = lastGeocodeAddr || `${pickedLat.toFixed(5)}, ${pickedLng.toFixed(5)}`;
  const badge = document.getElementById('coords-badge');
  badge.textContent = `📡 ${pickedLat.toFixed(5)}, ${pickedLng.toFixed(5)}`;
  badge.classList.add('visible');
  closeMap();
}

function closeMap() {
  document.getElementById('overlay-map').classList.remove('open');
}

// ─── MINI MAPS ────────────────────────────────────────────────────────────────
const miniMaps = {};

function initMiniMap(containerId, lat, lng) {
  if (miniMaps[containerId]) {
    miniMaps[containerId].invalidateSize();
    return;
  }
  const m = L.map(containerId, {
    zoomControl: false, attributionControl: false,
    dragging: false, scrollWheelZoom: false,
    doubleClickZoom: false, keyboard: false, touchZoom: false
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 17 }).addTo(m);
  m.setView([lat, lng], 13);
  L.circleMarker([lat, lng], { radius: 7, color: '#009A3C', fillColor: '#33B865', fillOpacity: 1, weight: 2 }).addTo(m);
  miniMaps[containerId] = m;
  // Forzar recálculo de tiles una vez el contenedor está pintado
  setTimeout(() => m.invalidateSize(), 100);
  setTimeout(() => m.invalidateSize(), 400);
}

// ─── RENDER LISTA ─────────────────────────────────────────────────────────────
function renderList(list) {
  const el = document.getElementById('parcelas-list');
  if (!list.length) {
    el.innerHTML = '<p style="text-align:center;color:var(--muted);margin-top:40px;">No hay parcelas aún.<br>Pulsa ＋ para añadir.</p>';
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="parcela-card" onclick="openDetail(${p.id})">
      ${p.lat ? `<div class="card-map" id="mini-${p.id}"></div>` : ''}
      <div class="card-header">
        <h3>${p.nombre}</h3>
        <span class="badge">${p.variedad}</span>
      </div>
      <div class="card-body">
        <div class="card-row"><div class="card-field"><span>📍</span> ${p.ubicacion}</div></div>
        <div class="card-row">
          <div class="card-field">Sup.<strong>${p.superficie} ha</strong></div>
          <div class="card-field">Agricultor<strong>${p.agricultor}</strong></div>
          <div class="card-field">Siembra<strong>${p.siembra || '—'}</strong></div>
        </div>
      </div>
      <div class="card-footer">
        <span>📷 ${p.seguimientos.reduce((a,s)=>a+s.fotos.length,0)} fotos</span>
        <span>💬 ${p.seguimientos.length} seguimientos</span>
        <span style="margin-left:auto;color:var(--green);font-weight:600;font-size:.75rem;">${lastDate(p)} →</span>
      </div>
    </div>
  `).join('');

  // init mini maps after DOM update
  requestAnimationFrame(() => {
    list.forEach(p => {
      if (p.lat) initMiniMap(`mini-${p.id}`, p.lat, p.lng);
    });
  });
}

function lastDate(p) {
  if (!p.seguimientos.length) return 'Sin seguimiento';
  return 'Último: ' + p.seguimientos[p.seguimientos.length - 1].fecha;
}

function filterParcelas(q) {
  const lq = q.toLowerCase();
  renderList(parcelas.filter(p =>
    p.nombre.toLowerCase().includes(lq) ||
    p.variedad.toLowerCase().includes(lq) ||
    p.agricultor.toLowerCase().includes(lq) ||
    p.ubicacion.toLowerCase().includes(lq)
  ));
}

// ─── DETALLE ──────────────────────────────────────────────────────────────────
function openDetail(id) {
  currentParcelaId = id;
  const p = parcelas.find(x => x.id === id);

  const timeline = p.seguimientos.slice().reverse().map(s => `
    <div class="timeline-item">
      <div class="ti-header">
        <span class="ti-date">📅 ${s.fecha}</span>
        <span class="ti-author">${p.agricultor}</span>
      </div>
      ${s.fotos.length ? `
        <div class="ti-fotos">
          ${s.fotos.map(f => f === 'demo'
            ? `<div class="demo-foto"><span style="font-size:2rem">🌿</span><span>Foto</span></div>`
            : `<img src="${f}" />`
          ).join('')}
        </div>` : ''}
      <span class="ti-tag">${s.estado}</span>
      <div class="ti-comment">${s.comentario}</div>
      <div class="ti-actions">
        <button class="ti-btn ti-btn-edit" onclick="openEditSeguimiento(${p.id},${s.id})">✏️ Editar</button>
        <button class="ti-btn ti-btn-del"  onclick="deleteSeguimiento(${p.id},${s.id})">🗑️ Eliminar</button>
      </div>
    </div>
  `).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      ${p.lat ? `<div class="detail-hero-map" id="detail-map-${p.id}"></div>` : ''}
      <div class="detail-hero-info">
        <h2>${p.nombre}</h2>
        <p>📍 ${p.ubicacion}</p>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Variedad</div><div class="info-val">🥔 ${p.variedad}</div></div>
      <div class="info-item"><div class="info-label">Superficie</div><div class="info-val">📐 ${p.superficie} ha</div></div>
      <div class="info-item"><div class="info-label">Agricultor</div><div class="info-val">👤 ${p.agricultor}</div></div>
      <div class="info-item"><div class="info-label">Proveedor</div><div class="info-val">🏢 ${p.proveedor}</div></div>
      <div class="info-item"><div class="info-label">Siembra</div><div class="info-val">📆 ${p.siembra || '—'}</div></div>
      <div class="info-item"><div class="info-label">Seguimientos</div><div class="info-val">📊 ${p.seguimientos.length}</div></div>
    </div>
    <button class="btn btn-primary" onclick="openSeguimiento()" style="margin-bottom:16px;">📷 Añadir seguimiento</button>
    <div class="section-title">Historial de seguimiento</div>
    <div class="timeline">${timeline || '<p style="color:var(--muted);text-align:center;padding:20px 0;">Sin seguimientos aún</p>'}</div>
  `;

  showScreen('screen-detail');
  document.getElementById('fab').style.display = 'none';

  if (p.lat) {
    requestAnimationFrame(() => initMiniMap(`detail-map-${p.id}`, p.lat, p.lng));
  }
}

function goBack() {
  showScreen('screen-parcelas');
  document.getElementById('fab').style.display = 'flex';
  currentParcelaId = null;
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  goBack();
  document.querySelectorAll('nav.bottom button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'stats') {
    showScreen('screen-stats');
    renderStats();
    document.getElementById('fab').style.display = 'none';
  } else {
    showScreen('screen-parcelas');
    document.getElementById('fab').style.display = 'flex';
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const totalHa = parcelas.reduce((a, p) => a + p.superficie, 0);
  const totalFotos = parcelas.reduce((a, p) => a + p.seguimientos.reduce((b,s) => b + s.fotos.length, 0), 0);
  const agricultores = new Set(parcelas.map(p => p.agricultor)).size;
  document.getElementById('s-parcelas').textContent = parcelas.length;
  document.getElementById('s-ha').textContent = totalHa.toFixed(1);
  document.getElementById('s-fotos').textContent = totalFotos;
  document.getElementById('s-agricultores').textContent = agricultores;

  const varMap = {};
  parcelas.forEach(p => { varMap[p.variedad] = (varMap[p.variedad] || 0) + p.superficie; });
  const maxVar = Math.max(...Object.values(varMap));
  document.getElementById('variety-bars').innerHTML = Object.entries(varMap)
    .sort((a,b) => b[1]-a[1])
    .map(([v,ha]) => `<div class="var-row"><div class="var-label"><span>${v}</span><span>${ha.toFixed(1)} ha</span></div><div class="bar-bg"><div class="bar-fill" style="width:${(ha/maxVar*100).toFixed(0)}%"></div></div></div>`).join('');

  const agMap = {};
  parcelas.forEach(p => { agMap[p.agricultor] = (agMap[p.agricultor] || 0) + p.superficie; });
  const maxAg = Math.max(...Object.values(agMap));
  document.getElementById('agricultor-bars').innerHTML = Object.entries(agMap)
    .sort((a,b) => b[1]-a[1])
    .map(([a,ha]) => `<div class="var-row"><div class="var-label"><span>${a}</span><span>${ha.toFixed(1)} ha</span></div><div class="bar-bg"><div class="bar-fill" style="width:${(ha/maxAg*100).toFixed(0)}%"></div></div></div>`).join('');
}

// ─── NUEVA PARCELA ────────────────────────────────────────────────────────────
function openNewParcela() {
  pickedLat = null; pickedLng = null;
  document.getElementById('coords-badge').classList.remove('visible');
  document.getElementById('overlay-parcela').classList.add('open');
}

function saveParcela(e) {
  e.preventDefault();
  const p = {
    id: nextId++,
    nombre: document.getElementById('f-nombre').value,
    ubicacion: document.getElementById('f-ubicacion').value,
    lat: pickedLat, lng: pickedLng,
    superficie: parseFloat(document.getElementById('f-superficie').value),
    variedad: document.getElementById('f-variedad').value,
    agricultor: document.getElementById('f-agricultor').value,
    proveedor: document.getElementById('f-proveedor').value,
    siembra: document.getElementById('f-siembra').value || '—',
    seguimientos: []
  };
  parcelas.unshift(p);
  renderList(parcelas);
  closeSheet('overlay-parcela');
  e.target.reset();
  document.getElementById('coords-badge').classList.remove('visible');
  pickedLat = null; pickedLng = null;
}

// ─── SEGUIMIENTO ──────────────────────────────────────────────────────────────
function renderFotosGrid() {
  document.getElementById('fotos-grid').innerHTML = currentFotos.map((f, i) => `
    <div class="foto-thumb">
      <img src="${f}" />
      <button type="button" class="foto-del" onclick="removeFoto(${i})">✕</button>
    </div>
  `).join('');
}

function removeFoto(idx) {
  currentFotos.splice(idx, 1);
  renderFotosGrid();
}

function addPhoto(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      currentFotos.push(e.target.result);
      loaded++;
      if (loaded === files.length) renderFotosGrid();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function openSeguimiento() {
  editingSegId = null;
  currentFotos = [];
  renderFotosGrid();
  document.getElementById('seg-title').textContent = '📷 Añadir seguimiento';
  document.getElementById('f-estado').value = 'Normal';
  document.getElementById('f-comentario').value = '';
  document.getElementById('overlay-seguimiento').classList.add('open');
}

function openEditSeguimiento(parcelaId, segId) {
  const p = parcelas.find(x => x.id === parcelaId);
  const s = p.seguimientos.find(x => x.id === segId);
  currentParcelaId = parcelaId;
  editingSegId = segId;
  // cargar fotos existentes (excluimos las 'demo' que son placeholder)
  currentFotos = s.fotos.filter(f => f !== 'demo');
  renderFotosGrid();
  document.getElementById('seg-title').textContent = '✏️ Editar seguimiento';
  document.getElementById('f-estado').value = s.estado;
  document.getElementById('f-comentario').value = s.comentario;
  document.getElementById('overlay-seguimiento').classList.add('open');
}

function deleteSeguimiento(parcelaId, segId) {
  if (!confirm('¿Eliminar este seguimiento?')) return;
  const p = parcelas.find(x => x.id === parcelaId);
  p.seguimientos = p.seguimientos.filter(s => s.id !== segId);
  openDetail(parcelaId);
}

function saveSeguimiento(e) {
  e.preventDefault();
  const p = parcelas.find(x => x.id === currentParcelaId);
  const estado = document.getElementById('f-estado').value;
  const comentario = document.getElementById('f-comentario').value || 'Sin comentario.';

  if (editingSegId !== null) {
    // EDITAR
    const s = p.seguimientos.find(x => x.id === editingSegId);
    s.estado = estado;
    s.comentario = comentario;
    s.fotos = currentFotos.length ? currentFotos : s.fotos;
  } else {
    // NUEVO
    const today = new Date();
    const fecha = `${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
    p.seguimientos.push({ id: nextSegId++, fecha, estado, comentario, fotos: [...currentFotos] });
  }

  closeSheet('overlay-seguimiento');
  openDetail(currentParcelaId);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function closeIfBg(e, id) { if (e.target.id === id) closeSheet(id); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderList(parcelas);
</script>
